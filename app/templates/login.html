<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body>
    <h1>Connexion</h1>
    <div>
        <!-- ─── Affichage des messages flash Flask ─── -->
        <!-- get_flashed_messages retourne les messages envoyés via flash() dans app.py -->
        <!-- with_categories=True permet de récupérer la catégorie ("error", "success") -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="{{ category }}">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}
        {% endwith %}


        <form action="", method="POST">
            <div>
                <label for="">Email</label><br>
                <input type="email" name="email" id="" placeholder="example@gmail.com" required>
                <br><br>
                <label for="">Password</label><br>
                <input type="password" name="password" id="" placeholder="mot de passe" required>
                <br><br>
                <button type="submit">Se connecter</button>
            </div>
        </form>
        <div>
            <p>
                Pas encore de compte?
                <a href="{{url_for('register')}}">S'inscrire</a>
            </p>
        </div>
    </div>
</body>
</html>
