<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
        }
        
        .container{
             
            border: 1px solid black;
        }
        h1{
            text-align: center;
        }
        .form{
            border: 0.5px solid black;
        }

        
    </style>
</head>
<body>
    <div class="container">
        <h1>Créez votre compte</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="{{ category }}">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form">
                <label for="">Nom complet</label><br>
                <input type="text" name="full_name" placeholder="nom complet" required>
                <br><br>
                <label for="">Adresse email</label><br>
                <input type="email" name="email" id="" placeholder="example@gmail.com" required>
                <br><br>
                <label for="">Mot de passe</label><br>
                <input type="password" name="password" id="" required>
                <br><br>
                <button type="submit">créer mon compte</button>
            </div>
        </form>
        <div>
            <p>
                Déjà un compte?
                <a href="{{url_for('login')}}">Se connecter</a>
            </p>
        </div>
    </div>
    
</body>
</html>
