<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
</head>
<body>

    

    <div class="container">
        <div class="left">
            <h1>Ajouter une nouvelle tâche</h1>
                <form method="POST">
                    <div class="form1">
                        <label for="">TITRE</label><br>
                        <input type="text" name="title" placeholder="Titre" required>
                        <br><br>
                        <label for="">DESCRIPTION</label><br>
                        <textarea type="text" name="description" placeholder="Description"></textarea>
                        <br><br>
                        <label for="">ECHEANCE</label><br>
                        <input type="date" name="due_date" placeholder="">
                        <br><br>
                        <button type="submit">Ajouter +</button> 
                    </div>  
                </form>
        </div>
        
        <div class="right">
            <h1 class="h1">Mes tâches</h1> <a class="deconnexion" href="{{url_for('logout')}}">Déconnexion</a> <hr>
             <ul>
                {% for task in tasks %}
                    <li>
                        <strong>{{task.title}}</strong> <br>
                        {{task.description}} <br>
                        {{task.due_date}} 
                        {% if task.done == False%}
                        <p>Pas terminé</p>
                        {% else %}
                        <p>Terminé</p>
                        {% endif %}
                        <form action="{{url_for('delete',task_id = task.id)}}" method="POST">
                            <button>Supprimer</button>
                        </form>
                        <a href="{{ url_for('update_task', task_id = task.id) }}">Modifier</a>
                        <form action="{{url_for('toggle_done',task_id = task.id)}}" method="POST">
                            <button>Update</button>
                        </form>

                    </li>
                {% endfor %}
            </ul>
        </div>    
    </div>

    <style>
        .container{
            display: flex;
            height: auto;

       } 

       .left{
            width: 30%;
            background-color: rgb(202, 220, 213);
       }

       .right{
            width: 70%;
            background-color: rgb(185, 179, 198);
       }
        h1{
            text-align: center;
        }
       
        input,textarea, .form1 button{
            border: none;
            border-radius: 5px;
            padding: 10px;
            width: 99%;
            
        }

        .form1 button{
            background-color: black;
            color: white;
        }

        textarea{
            resize: none;
        }


        .form1{
            margin: 20px;
            margin-top: 40px;
        
        }
        .deconnexion{
            text-align: right;
        }

       
    </style>
</body>
</html>
